{% extends "base.html" %}
{% block content %}
<main class="flex-grow-1">
    <div class="container-lg mt-3">
        <h1>Сайты</h1>
            <table class="table table-bordered table-striped" data-test="urls">
                <thead>
                    <tr>
                        <td> ID </td>
                        <td> Имя </td>
                        <td> Последняя проверка </td>
                        <td> Код ответа </td>
                    </tr>
                </thead>
                {% for url in urls_content %}
                <tbody>
                    <tr>
                        <td> {{ url.id }} </td>
                        <td> <a href="/urls/{{ url.id }}" >{{ url.name }} </td>
                        <td> {{ url.created_at }} </td>
                        <td> {{ url.status_code }} </td>
                    </tr>
                </tbody>
                {% endfor %}
            </table>
    </div>
</main>
{% endblock %}
